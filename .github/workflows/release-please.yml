# GitHub Actions pinning policy: third-party actions are SHA-pinned with the
# tag in a trailing comment. See ci.yml header.
name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
