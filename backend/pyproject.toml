[tool.ruff]
# Target Python version
target-version = "py310"
line-length = 88

[tool.ruff.lint]
# E = pycodestyle (PEP 8 - Errors)
# W = pycodestyle (PEP 8 - Warnings)
# F = Pyflakes (Logical errors)
# I = Isort (Import sorting)
# D = Pydocstyle (PEP 257 - Docstrings)
# UP = Pyupgrade (Auto modernization)
select = ["E", "W", "F", "I", "D", "UP"]

# Ignore conflicting or too noisy rules
ignore = [
    "D104", # Missing docstring in public package
    "E501", # Line too long
]

[tool.ruff.lint.pydocstyle]
# Use "google" convention for clarity
convention = "google"

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["D103"]
"scripts/*" = ["E402"]
"backend/scripts/*" = ["E402"]
"update_study.py" = ["E402"]
"backend/update_study.py" = ["E402"]
